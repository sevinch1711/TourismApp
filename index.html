<!DOCTYPE html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Buxoro - Qadimiy Sharq Gavhari</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              serif: ['"Playfair Display"', 'serif'],
              sans: ['"Inter"', 'sans-serif'],
            },
            colors: {
              bukhara: {
                primary: '#0B1D36', // Midnight Navy - Bir ton to'qroq, jiddiy va chuqur ko'k
                secondary: '#ca8a04', // Rich Gold
                bg: '#fafaf9',      // Stone-50
                surface: '#ffffff', // Pure White
                text: '#1c1917',    // Stone-900
                muted: '#57534e',   // Stone-500
                
                // Legacy mappings
                accent: '#ca8a04',
                dark: '#1c1917',
                teal: '#0B1D36', 
                gold: '#ca8a04',
              }
            },
            boxShadow: {
              'soft': '0 4px 20px -2px rgba(0, 0, 0, 0.05)',
              'hover': '0 10px 25px -5px rgba(11, 29, 54, 0.1), 0 8px 10px -6px rgba(11, 29, 54, 0.1)',
            },
            animation: {
                'fade-up': 'fadeUp 0.8s ease-out forwards',
            }
          }
        }
      }
    </script>
    <style>
      body {
        background-color: #fafaf9; /* Stone-50 */
        color: #1c1917;
      }
      .scrollbar-hide::-webkit-scrollbar {
          display: none;
      }
      .scrollbar-hide {
          -ms-overflow-style: none;
          scrollbar-width: none;
      }
      /* Smooth scrolling */
      html {
        scroll-behavior: smooth;
      }

      /* Custom Animations */
      @keyframes fadeUp {
          from {
              opacity: 0;
              transform: translateY(20px);
          }
          to {
              opacity: 1;
              transform: translateY(0);
          }
      }

      .animate-fade-up {
          opacity: 0;
          animation: fadeUp 0.8s ease-out forwards;
      }
    </style>
